      <h1 style="font-family:Helvetica,Arial,sans-serif;font-size:32px">The Perfect Kickoff Call (Doesn’t Start in the Calendar)
</h1>
      <p style="color:#999;font-size:13px">4 minutes · Outcomes</p>
      <p>Welcome everyone, thanks for joining. Let’s get started…</p>
      <p>Except… it’s already too late.</p>
      <p>If your kickoff starts on the calendar invite, you’re behind.</p>
      <p>The perfect kickoff begins in the shadows before the call, before the deck, before the invite even goes out.</p>
      <p>Let me explain.</p>
      <hr>
      <h2>Why “Re-Discovery” Is the Secret Weapon</h2>
      <p>One of the best kickoff calls I’ve ever led didn’t start with a slide.</p>
      <p>It started with a Slack ping:</p>
      <blockquote>“Hey, can you review the sales handover doc before our kickoff next week?”</blockquote>
      <p>I did.</p>
      <p>And I saw it right away: misalignment.</p>
      <p>Stakeholders listed were outdated. Goals were vague. Some of the timelines referenced were already irrelevant.</p>
      <p>Here’s the thing most CSMs miss:</p>
      <p>Sales cycles are long. Priorities shift. People move on.</p>
      <p>That’s why my kickoff always starts with a step I call <strong>Re-Discovery</strong>.</p>
      <p>Before I even think about running that call, I block time to:</p>
      <ul>
      <li>Re-read the sales notes, SE discovery, and board-level insights</li>
      <li>Schedule 15-min pre-kickoff interviews with key stakeholders</li>
      <li>Confirm who the real decision-makers are (not just who was there at close)</li>
      <li>Validate and update their business goals</li>
      </ul>
      <p>Because if we don’t align on where they’re going, how can we possibly help them get there?</p>
      <hr>
      <h2>The Most Common Kickoff Mistake</h2>
      <p>Want to know what actually kills a kickoff?</p>
      <p>It’s not bad slides. It’s not even unclear goals.</p>
      <p>It’s this: <strong>Showing up like strangers.</strong></p>
      <p>When CS, Sales, SEs, and Services aren’t aligned behind the scenes — the customer sees it instantly.</p>
      <p>You:</p>
      <ul>
      <li>Ask questions that were already answered</li>
      <li>Suggest timelines that clash with their roadmap</li>
      <li>Look unprepared. Uncoordinated. Unsafe</li>
      </ul>
      <p>And trust drops before it ever had a chance to build.</p>
      <p>So before the customer ever sees a kickoff agenda, I check:</p>
      <ul>
      <li>Sales-to-CS handover is complete</li>
      <li>Goals are documented, and validated</li>
      <li>Key personas are researched (yes, even LinkedIn stalking counts)</li>
      <li>Timeline is mapped to their events, not just our onboarding flow</li>
      <li>We’ve got all three layers in the room: doers, managers, and execs</li>
      </ul>
      <hr>
      <h2>Kickoff Isn’t a Ceremony — It’s a Power Move</h2>
      <p>Here’s what a perfect kickoff call actually does:</p>
      <ul>
      <li>Sets the tone for the entire partnership</li>
      <li>Shows your customer you’re not a vendor. You’re a growth ally</li>
      <li>Turns customer goals into shared targets</li>
      </ul>
      <p>One time, I skipped the re-discovery phase because I “trusted the handover.”</p>
      <p>Big mistake.</p>
      <p>Midway through the call, the customer said:</p>
      <blockquote>“Actually, that’s not our priority anymore that was before the re-org.”</blockquote>
      <p>We looked like we hadn’t done our homework.</p>
      <p>Momentum? Gone.</p>
      <p>Trust? Delayed.</p>
      <p>All because I skipped 30 minutes of prep.</p>
      <hr>
      <h2>The Mindset Shift Most CSMs Miss</h2>
      <p>Most CSMs approach kickoff like a checklist.</p>
      <p><strong>Here’s how I approach it:</strong></p>
      <p>Kickoff is your audition for trusted advisor status.</p>
      <p>And trusted advisors don’t just guide  they adapt.</p>
      <p>They listen. Challenge. Reframe.</p>
      <p>They make it about the customer, not the software.</p>
      <p><strong>The perfect kickoff doesn’t “impress” the customer it aligns with them.</strong></p>
      <p>And when you do that, everything after kickoff gets easier.</p>
      <hr>
      <p>“This issue includes 2 companion playbooks: one for pre-call prep, one for running the actual kickoff.”</p>
