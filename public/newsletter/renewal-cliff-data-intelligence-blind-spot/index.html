      <p style="font-size:11px;letter-spacing:3px;color:#C8553D;font-weight:bold;text-transform:uppercase">CHURN IS DEAD</p>
      <h1 style="font-family:Helvetica,Arial,sans-serif;font-size:32px">The Renewal Cliff Nobody Charted: Why CS Doesn&#x27;t Own Half the Churn It&#x27;s Blamed For</h1>
      <p style="color:#999;font-size:13px">11 min read · Data & Intelligence</p>
      <p>Ninety days.</p>
      <p>That&#x27;s the notice we got on a seven-figure enterprise account that was green on every dimension the platform tracked. Usage trending up quarter over quarter. Ticket volume down. Last NPS response a 9, written by a power user who&#x27;d built three internal workflows on top of the product.</p>
      <p>The health score had been a calm, confident green for fourteen straight months. Not the lazy green where someone forgot to update the model. The kind backed by real signal: people logging in, features adopted, support load light.</p>
      <p>Then the renewal email arrived. Polite. Final. &quot;We&#x27;ve made a strategic decision to consolidate platforms and reallocate budget. This isn&#x27;t about your product.&quot;</p>
      <p>It wasn&#x27;t about the product. That was the whole problem.</p>
      <p>The decision had been made eleven weeks earlier, in a budget meeting nobody from my side was in, by a CFO who&#x27;d joined four months prior and was rationalizing the vendor stack to free up spend for an AI initiative the board wanted funded by year-end. None of that touched our telemetry. None of it could. The CSM found out the way you always find out about the churn your dashboard can&#x27;t see: from the customer, after it was already decided.</p>
      <p>The model didn&#x27;t fail. The model did exactly what it was built to do. That&#x27;s the part nobody wants to sit with.</p>
      <hr>
      <h2>The thing your stack was never designed to see</h2>
      <p>Let me be precise about what happened, because the precision is the point.</p>
      <p>The data intelligence stack measured product reality. Inside that frame, the account was healthy, and the frame was correct. People used the thing. They liked the thing. If product engagement were the only force acting on a renewal, this account renews for three more years.</p>
      <p>But renewals don&#x27;t get decided inside your product. They get decided inside the customer&#x27;s org chart, their budget cycle, and the private conversations a buyer has with peers you&#x27;ll never be cc&#x27;d on. Your stack has no sensor pointed at any of those places. It was never built to. And the harder vendors push &quot;AI value scoring with 85% churn-prediction accuracy,&quot; the more we forget what that 85% is accurate *about*.</p>
      <p>It&#x27;s accurate about the half of churn that lives in your telemetry. It says nothing about the half that doesn&#x27;t.</p>
      <p>That second half has a name now, because I got tired of explaining it in meetings without one. I call it <strong>off-telemetry churn: the share of lost ARR your dashboard never flagged.</strong> Not flagged late. Never flagged. The signal that decided the renewal never crossed the boundary your instrumentation can reach.</p>
      <p>I&#x27;m not going to hand you a precise industry percentage for how big that half is, because nobody has measured it honestly and I won&#x27;t pretend a number I made up is research. What I can tell you is what I&#x27;ve watched across enterprise books: a meaningful share of seven-figure losses arrived with the health score still green, and in almost every one, the root cause was sitting in plain sight inside the customer&#x27;s organization months before we saw a flicker.</p>
      <p>You don&#x27;t need a benchmark to feel this. Go pull your own last twelve months. You already know which ones blindsided you.</p>
      <hr>
      <h2>Why this is getting worse, not better</h2>
      <p>Two things are happening at once, and they&#x27;re pulling in opposite directions.</p>
      <p>The confidence of the data is rising. Vendors are shipping autonomous value scoring, AI-generated QBRs, agentic risk detection. The dashboards have never looked more authoritative. Median private B2B SaaS net revenue retention has slid from roughly 105% in 2021 toward the low 100s today, and public software net dollar retention sits near 108%, down from a 125% peak in mid-2022 (Blossom Street Ventures&#x27; tracking of public SaaS). ChartMogul&#x27;s data puts AI-native SaaS at a startling ~48% median NRR. The base is harder to retain than it&#x27;s been in years.</p>
      <p>So here&#x27;s the collision. The instruments are getting more confident exactly as the forces that actually move renewals are migrating *off* the telemetry. Budget is moving toward AI-native bets. CFOs who joined in the last year are rationalizing vendor sprawl. M&amp;A is reshuffling which platform survives a consolidation. None of that is a usage decline you can catch in a product graph.</p>
      <p>Jason Lemkin put the failure mode plainly in a widely-shared post this year. Companies under pressure, he wrote, &quot;jack up prices without delivering more value. They cut CS headcount to hit EBITDA targets. They turn &#x27;customer success&#x27; into a collections department for expansion revenue. It works for a quarter or two. Then NRR starts sliding.&quot;</p>
      <p>He&#x27;s right. And I&#x27;d extend it one step further than the post goes. The companies sliding fastest aren&#x27;t just monetizing the relationship too early. They&#x27;re staring at a green dashboard while they do it, mistaking the confidence of the instrument for coverage of the problem. The model says the base is healthy. The org chart says the base is in play. Only one of those is talking to the customer.</p>
      <p>A health score that&#x27;s green right up until a reorg, a budget freeze, or an acquisition blindsides the renewal is theater, whether a human or an LLM produced it. <strong>Automating the scorecard doesn&#x27;t reduce the blindness. It industrializes it.</strong></p>
      <hr>
      <h2>The Off-Telemetry Map</h2>
      <p>If you want to stop getting surprised at renewal, you have to map where churn signals actually originate, and admit which of those places your stack can and cannot reach.</p>
      <p>There are four. Three of them your data intelligence platform will never see on its own.</p>
      <h3>1. In-product signals</h3>
      <p>This is the half your stack already sees, and the half it over-trusts. Logins, feature adoption, depth of integration, support volume, time-to-value on new modules. Real, useful, and the easiest thing in the world to mistake for the whole picture.</p>
      <p>The trap isn&#x27;t that these signals are wrong. It&#x27;s that they&#x27;re *complete within their own frame* and silent about everything outside it. A deeply adopted account with five integrations and a power-user champion looks bulletproof right up until the org that employs the champion decides to standardize on a competitor post-acquisition. The product signal stays green because the product is, genuinely, still being used. By people whose budget authority just evaporated.</p>
      <p><strong>Detection mechanic:</strong> you already have this. The discipline is to stop treating it as the renewal forecast. It&#x27;s one input of four, not the verdict.</p>
      <h3>2. Org-chart signals</h3>
      <p>Reorgs. Champion departures. A new executive two levels above your buyer who has opinions about vendor consolidation. This is invisible to telemetry by definition: nothing about a customer&#x27;s internal restructure shows up in how they log into your software.</p>
      <p>In the account I opened with, the single most predictive signal arrived four months before notice. A new CFO. That&#x27;s it. A LinkedIn update. Our entire data intelligence stack generated zero signal from the most important event in the account&#x27;s year, because the event happened in a press release, not a product log.</p>
      <p><strong>Detection mechanic:</strong> Set a Sales Navigator alert on every named contact and every C-suite seat in your top 50 accounts. A new CFO, a champion&#x27;s title change, a &quot;we&#x27;re hiring a VP of Platform Strategy&quot; req. Those are churn signals your CSP will never generate, available for the price of someone reading them every Monday. The sensor is cheap. The discipline of pointing it at the right 50 accounts is what&#x27;s rare.</p>
      <h3>3. Budget-and-priority signals</h3>
      <p>Spend freezes. Reallocation toward AI-native bets. M&amp;A that triggers a vendor standardization review. This is where most of the seven-figure surprises in my experience actually originate, and it&#x27;s the category your data is most structurally blind to, because it lives in a meeting you&#x27;re not in, governed by a P&amp;L you&#x27;ll never see.</p>
      <p>When a customer&#x27;s board decides to fund an AI program by trimming the vendor stack, your product could be flawless and you&#x27;d still lose the line. The decision isn&#x27;t about whether the product works. It&#x27;s about whether the *category* survives the budget cycle. No usage graph predicts that.</p>
      <p><strong>Detection mechanic:</strong> This one is human and it&#x27;s earned, not automated. It comes from a CSM who knows the customer&#x27;s fiscal year boundaries, who asks &quot;what&#x27;s the budget conversation looking like for next year?&quot; in Q2 and not Q4, who has a relationship with someone in the customer&#x27;s finance or procurement function and not just the daily user. If your CSMs can&#x27;t tell you their top accounts&#x27; budget cycles from memory, you have no coverage here at all.</p>
      <h3>4. Sentiment-of-record signals</h3>
      <p>There are two kinds of customer sentiment. There&#x27;s what the buyer says *to you*, which lands in your surveys, your QBR notes, your call transcripts. And there&#x27;s what the buyer says *to peers*, in a Slack DM to another head of platform, in a private vendor-review forum, at a dinner where someone asks &quot;are you still happy with them?&quot;</p>
      <p>The second kind is the sentiment of record. It&#x27;s the one that travels, the one that shapes the renewal, and it&#x27;s the one you will never instrument, because it was specifically not said to you. Any model trained on your interaction history learns the first kind beautifully and the second kind not at all, for the simple reason that the data was never yours to train on.</p>
      <p><strong>Detection mechanic:</strong> The only sensor is a human the customer trusts enough to be honest with off the record. You build this by being genuinely useful before you ever need the intel, so that when the skeptical VP starts whispering doubts to peers, your champion picks up the phone and tells you. That&#x27;s not a dashboard. That&#x27;s a relationship that earned a backchannel.</p>
      <hr>
      <h2>The audit: stop guessing how blind you are</h2>
      <p>Knowing the map is useless until you know your own exposure. So run the audit. It takes a CS Ops lead about a day and it will change how you read every forecast afterward.</p>
      <p>1. <strong>Pull your last twelve months of enterprise churn and downgrade.</strong> Every logo lost, every meaningful contraction. ARR figure attached to each.</p>
      <p>2. <strong>Sort each loss into one of two buckets: telemetry-visible or off-telemetry.</strong> Telemetry-visible means the root cause showed up in product data with enough lead time to act: declining usage, failed adoption, a support crisis. Off-telemetry means the deciding factor was a reorg, a budget call, an acquisition, a champion exit, or peer sentiment that never touched your stack. Be honest. &quot;The usage was declining and we missed it&quot; is telemetry-visible and it&#x27;s on you. &quot;A new CFO killed the category in a budget meeting&quot; is off-telemetry and no amount of usage scoring would have caught it.</p>
      <p>3. <strong>For each off-telemetry loss, score how early a human could have caught it.</strong> Was there a LinkedIn change, a budget cycle, a quiet champion you&#x27;d stopped calling? Mark the earliest moment a *human paying attention* would have seen the signal, even though the model never could. This is the gap between &quot;unknowable&quot; and &quot;knowable, but not by your software.&quot;</p>
      <p>4. <strong>Tally the off-telemetry ARR as a share of total lost ARR.</strong> That number is your off-telemetry churn rate, and it&#x27;s the most important figure your renewal forecast has never included.</p>
      <p>Here&#x27;s the punchline, the so-what the whole exercise exists to deliver: <strong>if more than a third of your lost enterprise ARR was off-telemetry, your renewal forecast is fiction.</strong> Not pessimistic, not optimistic. Fiction, because it&#x27;s built almost entirely on the one signal category your audit just proved misses the majority of your losses. You&#x27;re forecasting renewals off a sensor pointed at the wrong half of the building.</p>
      <p>And if that&#x27;s true, more dashboard accuracy won&#x27;t fix it. A model that&#x27;s 85% accurate on the visible half, scaled and automated and run autonomously, just gives you faster, more confident fiction.</p>
      <hr>
      <h2>What to do once you know the number</h2>
      <p>The fix isn&#x27;t a better algorithm. It&#x27;s a coverage model that treats off-telemetry signal as a first-class job, not an accident a good CSM occasionally stumbles into.</p>
      <p>1. <strong>Assign org-chart and budget coverage explicitly.</strong> For your top accounts, someone owns knowing the org structure, the fiscal calendar, and the executive seats above your buyer. Put it in the account plan. Review it like you review usage. If it lives only in a CSM&#x27;s head, it leaves when they do.</p>
      <p>2. <strong>Build the cheap sensors first.</strong> Sales Navigator alerts on named contacts. A standing question about budget cycles in mid-year reviews. A documented list of who your real champion is and the last time you spoke off-script. None of this needs procurement approval. All of it catches things your platform can&#x27;t.</p>
      <p>3. <strong>Stop monetizing the relationship before the renewal is safe.</strong> The fastest way to lose your sentiment-of-record sensor is to turn every check-in into an upsell, until the champion stops being honest with you because every honest answer becomes a sales opening. Lemkin&#x27;s right that the best motions &quot;separate expansion from relationship.&quot; The accounts that most need a stabilizing human are the ones getting the most quota pressure. Protect the backchannel.</p>
      <p>4. <strong>Report off-telemetry churn to your board every quarter.</strong> The moment you put a number on the churn your stack can&#x27;t see, the conversation stops being &quot;why didn&#x27;t the model catch it&quot; and becomes &quot;how do we cover what no model can.&quot; That&#x27;s the conversation that actually saves renewals.</p>
      <hr>
      <p>The account I opened with renewed nowhere. We lost it clean, on ninety days&#x27; notice, with a green health score and a power user who genuinely loved the product. For a year afterward, people asked how the model missed it.</p>
      <p>The model didn&#x27;t miss it. The model reported faithfully on the only thing it could see. We missed it, because we&#x27;d quietly decided the dashboard was the territory instead of a map of one quarter of it.</p>
      <p>Pull your twelve months. Sort them honestly. Find out how much of what walked out the door was ever yours to catch.</p>
      <p>The number you get back is the real measure of whether you&#x27;re running customer success or just watching a very confident graph.</p>
