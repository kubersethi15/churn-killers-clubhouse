      <h1 style="font-family:Helvetica,Arial,sans-serif;font-size:32px">The Question That’s Breaking Your CS Team</h1>
      <p style="color:#999;font-size:13px">5 minutes · Strategy</p>
      <p>The Renewal Ownership Question Is Wasting Everyone’s Time</p>
      <blockquote>“Should CSMs own renewals?”</blockquote>
      <blockquote>It sounds like a smart question but it’s not.</blockquote>
      <p>Last week, a CS leader at a $50M ARR company asked me that exact thing.</p>
      <p>My response?</p>
      <p><strong>“You’re asking the wrong question.”</strong></p>
      <p>It surprised him.</p>
      <p>But that question is organizational quicksand.</p>
      <p>Here’s why — and the framework that fixes it.</p>
      <hr>
      <h2>The Renewal Ownership Myth</h2>
      <p>We’ve all seen the pattern.</p>
      <p>A company grows.</p>
      <p>Renewal ownership gets debated.</p>
      <p>And suddenly everyone is frustrated.</p>
      <p>Why?</p>
      <p>Because we’re treating renewals like a <strong>single person’s job</strong>.</p>
      <p>It’s not.</p>
      <p>A renewal isn’t a task, it’s the outcome of a system.</p>
      <p>Asking who &quot;owns&quot; it is like asking who owns landing a plane, the pilot or the co-pilot?</p>
      <p><strong>Wrong question.</strong></p>
      <p>They both own the outcome — through specialized roles.</p>
      <hr>
      <h2>The Proof: A $2M Renewal on the Brink</h2>
      <p>Last quarter, I watched a $2M enterprise renewal nearly implode because of this exact misalignment.</p>
      <ul>
      <li>The CSM built the value.</li>
      <li>Sales jumped in late to talk money.</li>
      <li>The customer felt ambushed.</li>
      <li>The deal went sideways.</li>
      </ul>
      <p>We fixed it by implementing a dynamic system for co-operation and clarity.</p>
      <p>I now call it the <strong>CO-OP Model™</strong>:</p>
      <p><strong>Customer Outcome &amp; Opportunity Playbook.</strong></p>
      <p><strong>The result:</strong></p>
      <p>The $2M renewal was saved and the team added an $800K expansion.</p>
      <hr>
      <h2>How the CO-OP Model™ Works</h2>
      <p>Instead of rigid “phases,” the CO-OP Model runs on <strong>three continuous work streams</strong> each with a different owner and adjustable intensity over time.</p>
      <h3>1. 🟦 Value Realization Stream (CSM-led)</h3>
      <p>Focused on ensuring the customer achieves and documents real business outcomes.</p>
      <h3>2. 🟥 Commercial Opportunity Stream (Sales-led)</h3>
      <p>Focused on protecting ARR, identifying expansion, and managing all commercial conversations.</p>
      <h3>3. 🟨 Strategic Alignment Stream (Jointly-owned)</h3>
      <p>Focused on multi-threading and aligning the solution with the customer’s evolving corporate strategy.</p>
      <hr>
      <h3>🧠 The Magic: The Intensity Dial</h3>
      <p>Each stream runs in parallel but not always at full power.</p>
      <ul>
      <li>Early lifecycle? <strong>Value Realization</strong> runs at 90% intensity.</li>
      <li>Mid-term? <strong>Strategic Alignment</strong> dials up.</li>
      <li>Pre-renewal? <strong>Commercial Opportunity</strong> takes the lead at 90%.</li>
      </ul>
      <p>The system adapts to the *reality* of the customer journey — instead of forcing one-size-fits-all phases.</p>
      <hr>
      <h2>Steal This Framework</h2>
      <p>I’ve documented the entire playbook:</p>
      <ul>
      <li>Every work stream</li>
      <li>Intensity dial setting</li>
      <li>Key metrics</li>
      <li>Joint Execution Zone rituals</li>
      <li>Communication workflows</li>
      </ul>
      <p>It’s the exact system that helped save that $2M renewal</p>
      <p>And it’s now being used by <strong>10+ enterprise CS teams</strong> to increase renewal predictability and expansion velocity.</p>
