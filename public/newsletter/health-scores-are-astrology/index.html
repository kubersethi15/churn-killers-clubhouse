      <h1 style="font-family:Helvetica,Arial,sans-serif;font-size:32px">Health Scores Are Astrology for CS Teams</h1>
      <p style="color:#999;font-size:13px">10 min read · Strategy</p>
      <p># CHURN IS DEAD</p>
      <p>*Issue: Health Scores Are Astrology for CS Teams*</p>
      <hr>
      <h2>Green, Green, Green, Gone</h2>
      <p>Last year, a CS leader at an infrastructure monitoring company shared a story that stuck with me.</p>
      <p>Their biggest customer — $2.4M ARR, four-year relationship, executive sponsor on speed dial — had a health score of 94. Ninety-four. Usage was strong. NPS was 9. Support tickets were low. QBR attendance was consistent. Every indicator in their platform said this account was thriving.</p>
      <p>The customer churned.</p>
      <p>Not downsized. Not consolidated. Churned entirely. Ripped out the platform. Gone.</p>
      <p>When the post-mortem happened, the picture was devastating. The customer&#x27;s new CTO — who&#x27;d started seven months earlier — had never been a user of the product at a previous company and didn&#x27;t believe in the monitoring approach. He&#x27;d been quietly evaluating competitors since month two. By month five, the migration plan was approved. By month seven, the procurement team was negotiating exit terms.</p>
      <p>The health score was green the entire time. Because health scores measure what the product sees, not what the customer&#x27;s organization is actually thinking.</p>
      <p>The CSM found out two weeks before the contract expired. By then, the decision wasn&#x27;t just made — it was implemented.</p>
      <p>Ninety-four. Green. Gone.</p>
      <hr>
      <h2>The Astrology Problem</h2>
      <p>Health scores in Customer Success work exactly like horoscopes.</p>
      <p>They feel accurate because they&#x27;re vague enough to match whatever narrative you want. A green score confirms that your customer is happy. A yellow score confirms you need to &quot;keep an eye on it.&quot; A red score confirms what you already knew — the account is in trouble.</p>
      <p>But here&#x27;s what horoscopes and health scores have in common: <strong>they describe the present in terms generic enough to feel true while predicting absolutely nothing about the future.</strong></p>
      <p>Let me prove it.</p>
      <p>Pull up your health score dashboard right now. Look at every account scored green — say, above 80. Now ask yourself: can you guarantee that every single one of those accounts will renew? Of course not. Some of them are actively evaluating competitors and you don&#x27;t know it. Some of them have a new VP who&#x27;s skeptical. Some of them are &quot;happy&quot; but their budget authority just shifted to someone you&#x27;ve never met.</p>
      <p>Now look at your red accounts — below 40. Can you guarantee they&#x27;ll all churn? Also no. Some of them are messy but deeply dependent on your product. Some of them complain loudly but would never actually migrate because the switching cost is astronomical. Some of them score red because a single power user left and usage dipped — but the account is structurally fine.</p>
      <p>Your health score is measuring the symptoms. It has no idea about the disease. And worse: it gives you confidence about accounts that should terrify you, and anxiety about accounts that are actually solid.</p>
      <hr>
      <h2>Why Health Scores Fail: The Five Blind Spots</h2>
      <h3>Blind Spot 1: They Measure Product Activity, Not Business Criticality</h3>
      <p>A customer logging in daily isn&#x27;t necessarily healthy. They might be logging in because they have to — because the product is embedded in a workflow — but they hate the experience and are counting the days until their contract allows them to switch. High usage and high satisfaction are not the same thing. And health scores treat them as if they are.</p>
      <p>Conversely, a customer with lower usage might have your product running in the background as critical infrastructure that they rarely touch because it just works. Low login frequency. Green health score says &quot;at risk.&quot; Reality says &quot;deeply embedded.&quot;</p>
      <h3>Blind Spot 2: They Can&#x27;t See Political Shifts</h3>
      <p>The number one predictor of enterprise churn isn&#x27;t product usage. It&#x27;s organizational change. New executives. Restructured teams. Shifted budgets. Strategic pivots. And health scores are completely blind to all of it because none of this shows up in product telemetry.</p>
      <p>A new CTO arrives with a mandate to consolidate vendors. A new CFO launches a cost reduction initiative. The champion who loved your product gets promoted to a role where they no longer influence the buying decision. These are the events that actually determine whether a customer stays or goes, and your health score dashboard knows nothing about any of them.</p>
      <h3>Blind Spot 3: They Reward Recency, Not Trajectory</h3>
      <p>Most health scores are point-in-time snapshots. Usage this month. NPS this quarter. Support tickets this period. They don&#x27;t weight trajectory — the direction things are moving.</p>
      <p>An account that was 95 six months ago and is now 82 is still &quot;green&quot; in most systems. But the trajectory is terrifying. Something changed. Something is eroding. A point-in-time score says everything&#x27;s fine. A trajectory analysis says something is very wrong.</p>
      <h3>Blind Spot 4: They Treat All Green as Equal</h3>
      <p>A $3M account with a health score of 85 and a $50K account with a health score of 85 get the same color on your dashboard. But the risk profiles are wildly different. The consequences of getting it wrong are wildly different. The level of attention required is wildly different.</p>
      <p>Health scores create a false equivalence that distorts resource allocation. Your team spends equal energy on accounts that are not equal in importance, because the dashboard told them the scores were the same.</p>
      <h3>Blind Spot 5: They Create Comfortable Ignorance</h3>
      <p>This is the most dangerous blind spot. When the dashboard says green, the CSM relaxes. The cadence slows. The depth of engagement decreases. &quot;They&#x27;re healthy — I&#x27;ll focus on my red accounts.&quot;</p>
      <p>Meanwhile, the green account is making decisions that will determine their renewal without any CS involvement. The health score didn&#x27;t just fail to predict the churn — it actively caused the CSM to disengage at the exact moment they should have been digging deeper.</p>
      <hr>
      <h2>From Health Scores to Predictability Scores</h2>
      <p>Health scores answer the question: &quot;How does this account look right now?&quot;</p>
      <p>The wrong question. The right question is: &quot;What is this account likely to do next, and how confident am I in that prediction?&quot;</p>
      <p>I&#x27;ve been developing what I call the <strong>Customer Predictability Index (CPI)</strong> — a replacement framework that focuses on predicting behavior instead of measuring sentiment. The difference isn&#x27;t semantic. It changes what you track, how you allocate resources, and when you intervene.</p>
      <h3>The 7 CPI Lenses</h3>
      <p>Instead of a single composite score, CPI evaluates each account through seven distinct lenses — each measuring a different dimension of predictability.</p>
      <p><strong>1. Stakeholder Stability</strong> — Have the key decision-makers changed in the last 6 months? Is the executive sponsor still in role? Have new influencers entered the picture? Organizational change is the #1 churn predictor, and this lens catches it.</p>
      <p><strong>2. Business Outcome Delivery</strong> — Not &quot;are they using the product?&quot; but &quot;has the product delivered the specific business outcome that justified the purchase?&quot; If they bought your security platform to reduce incident response time and it hasn&#x27;t measurably done that, usage metrics are meaningless.</p>
      <p><strong>3. Competitive Exposure</strong> — Are they being actively sold to by competitors? Are they evaluating alternatives? Has their industry seen a wave of migration to a competing solution? This requires intelligence gathering, not product telemetry.</p>
      <p><strong>4. Budget Authority Alignment</strong> — Is the person who controls the budget still the person who values your product? Budget authority shifts are invisible to health scores but devastating to retention.</p>
      <p><strong>5. Expansion Momentum</strong> — Is the account growing its usage into new teams, new use cases, new departments? Stagnant accounts are vulnerable accounts, even if current usage is strong.</p>
      <p><strong>6. Dependency Depth</strong> — How painful would migration actually be? How deeply is your product embedded in their operational workflows? Products that are hard to rip out don&#x27;t churn. Products that are easy to swap do.</p>
      <p><strong>7. Engagement Quality</strong> — Not frequency of meetings, but quality. Are the right stakeholders attending? Are discussions strategic or administrative? Is the customer bringing problems to you proactively, or are you chasing them for time?</p>
      <p>Each lens gets scored 1–5. But unlike a health score, the lenses are weighted differently per account based on what matters most for that customer&#x27;s specific risk profile. A government account where procurement cycles are rigid weights Budget Authority Alignment higher. A fast-moving startup account weights Competitive Exposure higher.</p>
      <hr>
      <h2>Your Customer Predictability Playbook</h2>
      <p>I&#x27;ve turned the CPI framework into a complete implementation guide that replaces your health score with something that actually predicts behavior.</p>
      <p><strong>The Customer Predictability Audit includes:</strong></p>
      <ul>
      <li><strong>The 7-Lens Scoring Rubric</strong> — Detailed criteria for scoring each lens with enterprise-specific calibration guidance</li>
      <li><strong>The Health Score vs. CPI Comparison</strong> — A side-by-side diagnostic showing where your current health scores are lying to you</li>
      <li><strong>The Stakeholder Stability Tracker</strong> — A template for monitoring organizational changes that health scores miss entirely</li>
      <li><strong>The Predictability Dashboard Template</strong> — How to visualize CPI across your book of business</li>
      <li><strong>The Intervention Playbook</strong> — Specific actions to take for each CPI risk pattern (low stakeholder stability + high dependency depth = different play than low business outcome + high competitive exposure)</li>
      </ul>
      <hr>
      <p>*Your health score is a comfort blanket. Your CPI is a radar system. One helps you sleep. The other helps you survive.*</p>
      <p>*— Kuber*</p>
      <p>*P.S. — Here&#x27;s a challenge. Pick your three &quot;healthiest&quot; accounts — the ones with the highest health scores — and score them across the 7 CPI lenses. If even one of them drops below a 3 on Stakeholder Stability or Competitive Exposure, you have a green account that&#x27;s about to go red and your dashboard will never tell you. Hit reply with what you found. I&#x27;m tracking how often CPI and traditional health scores disagree — and the early data is alarming.*</p>
