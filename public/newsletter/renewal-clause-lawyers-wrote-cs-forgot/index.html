      <p style="font-size:11px;letter-spacing:3px;color:#C8553D;font-weight:bold;text-transform:uppercase">CHURN IS DEAD</p>
      <h1 style="font-family:Helvetica,Arial,sans-serif;font-size:32px">The Renewal Clause Your Lawyers Wrote and Your CS Team Forgot</h1>
      <p style="color:#999;font-size:13px">10 min read · Revenue</p>
      <p>According to legal-ops and procurement benchmarking, a large share of enterprise SaaS contracts, roughly half by most published estimates, contain some form of price-adjustment language: a CPI peg, a fixed annual uplift, an auto-escalator tied to renewal.</p>
      <p>And enforcement rates run a fraction of that.</p>
      <p>Sit with the gap between those two numbers for a second. Half your enterprise book may carry a clause that lets you raise price without a sales cycle. A minority of those clauses actually get pulled.</p>
      <p>The rest sit dormant. Signed by the customer. Approved by their procurement. Written by your own legal team after a negotiation everyone has since forgotten. And never collected, because at renewal time the CSM was busy pitching a module instead of reading the contract they already had.</p>
      <p>This is the cheapest NRR in your portfolio. Nobody posts about it because it isn&#x27;t heroic. There&#x27;s no expansion deck, no champion-building arc, no LinkedIn victory lap. It&#x27;s just money the buyer already agreed to pay, quietly evaporating because enforcing a clause feels less strategic than selling something new.</p>
      <p>I want to give you the name for that evaporating money: <strong>the forgotten uplift.</strong> The compounding revenue you&#x27;re contractually owed and have never collected. And I want to give you the audit to go get it.</p>
      <hr>
      <h2>The Broken State: Earning Money You Already Own</h2>
      <p>Here&#x27;s the motion most enterprise CS teams are running right now.</p>
      <p>NRR slipped. Leadership wants it back. The reflex is expansion: new modules, new seats, new use cases, a cross-sell into the adjacent business unit. So the team builds the expansion deck, maps the buying committee, and books QBRs to socialise the pitch.</p>
      <p>All of which requires the one thing that&#x27;s currently frozen: net-new budget.</p>
      <p>CIOs are sitting on their wallets under AI-scrutiny. Every incremental dollar of software spend is getting the &quot;can an agent do this&quot; interrogation before it clears procurement. The upsell playbook everyone reaches for is precisely the motion stalling hardest this quarter.</p>
      <p>So you&#x27;re grinding a sales cycle for revenue you have to earn, against a buyer who&#x27;s been told to freeze, while a price increase the same buyer already signed sits unenforced in a PDF nobody has opened since the ink dried.</p>
      <p>You are earning money twice. Once when your legal team negotiated the escalator into the contract. And again, now, when your CSM tries to manufacture equivalent revenue through an expansion motion that needs approval the escalator never required.</p>
      <p>The forgotten uplift is the money you only had to earn once.</p>
      <hr>
      <h2>Why This Clause Goes Dark</h2>
      <p>Three things conspire to make the escalator invisible.</p>
      <p>First, low inflation trained everyone to ignore it. For most of the last decade, a CPI-pegged clause moved the number by one or two percent. Not worth the awkward renewal conversation, so teams let it slide. That habit calcified. Then inflation woke up, the clause got real, and the muscle to enforce it had atrophied.</p>
      <p>Second, the clause lives where CS doesn&#x27;t look. It&#x27;s in the master agreement, in the order form, in an addendum negotiated by legal and signed by procurement. Your CSM works out of the CRM and the CS platform. The commercial terms live in a contract-lifecycle system, or a shared drive, or an email thread from three years ago. If your CLM is Ironclad or DocuSign CLM or Salesforce&#x27;s contract objects, the clause might be tagged and surfaceable. If your contracts are PDFs in a folder called &quot;Signed - Final - FINAL v3,&quot; nobody is finding that escalator without going hunting.</p>
      <p>Third, and this is the real one: enforcing a clause feels administrative, and CS has spent ten years insisting it&#x27;s strategic. Pulling a price increase you already own doesn&#x27;t come with a champion story. It doesn&#x27;t feel like the outcome-architect work the discourse keeps promising. So it gets deprioritised by the very people best positioned to collect it.</p>
      <p>The uplift isn&#x27;t lost because it&#x27;s hard. It&#x27;s lost because it&#x27;s unglamorous.</p>
      <hr>
      <h2>The Landmine Nobody In The Discourse Mentions</h2>
      <p>Before I hand you the audit, the thing that separates people who&#x27;ve actually enforced a clause from people theorising about it.</p>
      <p>Most escalators are conditional on notice.</p>
      <p>Read your own contract language and you&#x27;ll find a notice window: the clause typically requires you to give the customer written notice of the price adjustment a set number of days before the renewal date. Sixty days. Ninety. Whatever your legal team wrote.</p>
      <p>Miss the window and in many contracts you have not merely delayed the increase. You may have waived your right to it for that term entirely. Some agreements go further and treat a missed notice as an election to renew at the existing price. You do not get to quietly backdate three years of forgotten uplift and send an invoice. A competent GC on the customer side will point at the notice clause and your uncollected years vanish.</p>
      <p>So the forgotten uplift is not a number you simply add up and bill. It&#x27;s a number you can capture going forward if you get the notice mechanics right, and mostly cannot recover looking backward if you let the windows lapse.</p>
      <p>This is exactly why the audit matters, and why &quot;just enforce your clauses&quot; is amateur advice. The value isn&#x27;t in the arithmetic of what you were owed. It&#x27;s in never missing another window again.</p>
      <hr>
      <h2>The Fixed State: Signed Revenue On A Schedule</h2>
      <p>Picture the enterprise CS org that&#x27;s done this work.</p>
      <p>Every enterprise contract has been read for commercial terms, not just kickoff scope. Each one is scored: does an escalator exist, what&#x27;s the mechanism, when&#x27;s the notice window, has it ever been enforced.</p>
      <p>The dormant clauses are surfaced into a portfolio view. Not a vague &quot;we should look into pricing&quot; agenda item. A dollar figure. &quot;Here is the annualised uplift we are contractually entitled to and are not collecting, and here is the notice date on each account before which we lose the right to it this term.&quot;</p>
      <p>Renewals now carry the escalator as a default, not an afterthought. The notice goes out inside the window, every time, because it&#x27;s a step in the renewal workflow rather than a thing someone might remember.</p>
      <p>And expansion becomes the second conversation, not the first. You collect the money you already own, then you go earn the money you don&#x27;t.</p>
      <p>That org isn&#x27;t working harder. It&#x27;s working the contract it already signed.</p>
      <p>The bridge between the broken state and the fixed one is an audit. Four steps.</p>
      <hr>
      <h2>The Signed-and-Forgotten Audit</h2>
      <p><strong>1. Find the clause.</strong></p>
      <p>Pull every enterprise contract and flag the price-adjustment language. CPI pegs, fixed annual uplifts, auto-escalators, renewal-rate provisions. You are hunting for any term that lets price move without a new negotiation.</p>
      <p>Where they live matters. If you&#x27;re on a real CLM, this is a query: Ironclad and DocuSign CLM can tag and search clause language, and Salesforce contract objects can be structured to surface renewal terms. If your contracts are unstructured PDFs, you&#x27;re doing a manual read, and that&#x27;s fine for the first pass. The point is to know, for every enterprise logo, whether an escalator exists and what triggers it.</p>
      <p>Most teams discover they genuinely don&#x27;t know. That&#x27;s the finding. You cannot enforce a lever you can&#x27;t locate.</p>
      <p><strong>2. Compound the gap, honestly.</strong></p>
      <p>Now model what the dormant escalators are worth. Not next year in isolation. Over the life of the contract.</p>
      <p>But model it against the notice reality, not against fantasy. Split the number in two. The recoverable uplift is what you can still capture on upcoming renewals where the notice window hasn&#x27;t lapsed. The forfeited uplift is what you&#x27;ve already lost to missed windows in prior terms, and you flag it not to invoice it but to make the cost of dormancy visceral.</p>
      <p>A four percent annual escalator compounded over a longer contract horizon is real money. Over three years it&#x27;s modest, roughly twelve and a half percent, and if someone tells you compounding makes that dramatic they&#x27;re selling you fake precision. Over five, six, seven years across a portfolio, the compounding actually bites, and the forfeited column is where the real sting lives. That&#x27;s the number you bring to leadership. Not the theoretical maximum. The recoverable figure plus the honest tally of what dormancy has already cost.</p>
      <p><strong>3. Sequence the ask.</strong></p>
      <p>Don&#x27;t enforce indiscriminately. Sequence.</p>
      <p>Start where the sponsor is stable and the relationship is healthy, because an escalator conversation with an account already eyeing the exit is how you turn a price adjustment into a churn event. Enforce on the renewals where the economic buyer is in seat, usage is solid, and the notice window is open.</p>
      <p>Get the notice out inside the window. This is the whole game. A clause you&#x27;re entitled to but failed to notice is a clause you don&#x27;t have this term.</p>
      <p>And sequence the escalator ahead of the expansion pitch on the same account. Collect the contractual uplift first. Then, with a renewal already trued-up to fair market price, go have the expansion conversation from a position of strength rather than trying to bundle a price increase and a net-new sale into one overloaded ask.</p>
      <p><strong>4. Build the notification play.</strong></p>
      <p>The reason the clause went dormant is that enforcement depended on someone remembering. Remove the memory dependency.</p>
      <p>Build a lightweight, non-negotiable renewal-notice motion. Every enterprise contract&#x27;s notice date lands on a calendar the renewals team owns. A templated notice fires inside the window as a default step in the renewal workflow, with an exception process for the handful of strategic accounts where you consciously choose to hold. The default is enforcement. The exception requires a decision.</p>
      <p>Do this and the escalator never goes dark again. The forgotten uplift stops being forgotten, structurally, not heroically.</p>
      <p>Find it. Compound it. Sequence it. Automate it.</p>
      <hr>
      <h2>Why This Is The NRR Conversation You Should Be Having</h2>
      <p>The reflex when net retention slips is to reach for a new motion. A better expansion play. An AI-drafted QBR. A cross-sell into the next business unit.</p>
      <p>All of that assumes the money you want lives in the future, in revenue you haven&#x27;t earned yet, gated behind a budget approval a frozen CIO won&#x27;t sign.</p>
      <p>The forgotten uplift assumes the opposite. Some of the money you want is in the past, in commitments the customer already made, gated behind nothing more than a notice you forgot to send.</p>
      <p>One of those is a sales cycle. The other is an operations problem. And operations problems are the ones you can actually solve inside a quarter without waiting on a buyer to unfreeze.</p>
      <p>Here&#x27;s the callout line for the leadership meeting: <strong>your NRR problem isn&#x27;t that you can&#x27;t sell more. It&#x27;s that you&#x27;re giving away price increases the customer already legally committed to.</strong></p>
      <p>The standard response to an escalator conversation is a flinch. Enforcing a clause feels adversarial, feels like it risks the relationship, feels like the opposite of the trusted-advisor posture CS prizes. But there is nothing adversarial about invoicing the terms both parties negotiated and signed. The adversarial move, if anything, is silently absorbing the customer&#x27;s price inflation on their behalf, subsidising their budget out of your revenue, and calling it partnership.</p>
      <p>Enforcing what you signed isn&#x27;t a departure from customer success. It&#x27;s the least surprising thing you can do. The customer&#x27;s own procurement team drafted their side of that clause. They&#x27;re not shocked it exists. They&#x27;re mildly surprised you never used it.</p>
      <hr>
      <h2>Do This Week</h2>
      <p>1. Pull ten enterprise contracts and read them for commercial terms, not scope. For each, answer three questions: does an escalator exist, what triggers it, when is the notice window. You&#x27;ll likely find you couldn&#x27;t answer that from memory for a single one.</p>
      <p>2. On the contracts that have a clause, find the last time it was enforced. If the answer is never, or three years ago, you&#x27;ve found your forgotten uplift.</p>
      <p>3. Check the notice window on the next renewal in that set. If it&#x27;s approaching, that&#x27;s your first, easiest capture. If you&#x27;ve already missed it for the current term, note it in the forfeited column and calendar the next one now.</p>
      <p>4. Build the portfolio number. Recoverable uplift you can still capture, and forfeited uplift dormancy has already cost. Bring both to your next leadership meeting before anyone sets an expansion target.</p>
      <p>5. Stand up the notification play. Every notice date on a calendar the renewals team owns, enforcement as the default, holding as the documented exception.</p>
      <hr>
      <p>The expansion deck can wait a week. It&#x27;s stalled on a budget freeze anyway.</p>
      <p>The escalator can&#x27;t. Every notice window that lapses is uplift you forfeit for an entire term, and no amount of heroic selling next quarter buys back the year you gave away by not opening the PDF.</p>
      <p>Go find the money you already own. Then go earn the rest.</p>
