      <p style="font-size:11px;letter-spacing:3px;color:#C8553D;font-weight:bold;text-transform:uppercase">CHURN IS DEAD</p>
      <h1 style="font-family:Helvetica,Arial,sans-serif;font-size:32px">The Day Your CSM Got Promoted to Babysitter</h1>
      <p style="color:#999;font-size:13px">11 min read · Team Design</p>
      <p>For a while now, Jason Lemkin has been arguing the traditional CSM role is dead. On June 3rd his SaaStr write-up put hard numbers behind it.</p>
      <p>The evidence is a thing called QB. An AI VP of Customer Success managing 150+ accounts end-to-end, on a stack of three humans and twenty-one agents. And the detail that stuck with everyone, from one of the earlier episodes: QB autonomously emailed 83 sponsors at 12:20am with fully customised, account-specific check-ins. No human in the loop. No human needed.</p>
      <p>He&#x27;s right about the work. He&#x27;s wrong about the conclusion. And the gap between those two things is the most important career question in customer success right now.</p>
      <p>Because here&#x27;s what actually happens when QB lands in a real enterprise org. The role doesn&#x27;t die. It splits. It splits into two jobs that almost nobody was hired to do, and most teams are about to sleepwalk into the worse half of the split while their leadership calls it strategic transformation.</p>
      <p>Let me show you both halves. Then let me give you the number that tells you which one you&#x27;re building.</p>
      <hr>
      <h2>The work QB actually does</h2>
      <p>Start with what&#x27;s true. QB managing 150 SaaStr sponsor accounts is real and it&#x27;s impressive. I&#x27;m not going to wave it away to protect a thesis.</p>
      <p>But look at the relationship shape. SaaStr sponsorships are largely single-vendor, transactional, renewed annually by one buyer who already knows the value because they can count the leads. The &quot;work&quot; is timely, personalised, high-volume outbound. That is precisely the work an agent does better than a tired human at midnight.</p>
      <p>Now put QB on a Fortune 500 account where the renewal is a board-level budget fight, the champion just left for a competitor, security flagged a data-residency issue that froze the expansion, and three internal stakeholders are quietly knifing each other over who owns the platform.</p>
      <p>QB can email all of them at 12:20am. None of those emails move the renewal one inch.</p>
      <p>That&#x27;s the split. The administrative core of the CSM job, the part that was 60 to 70 percent of the week, is now machine work. What remains divides into two distinct human jobs. Call them the <strong>supervisor</strong> and the <strong>closer</strong>.</p>
      <p>Most CSMs hired in the 2021 boom were hired for neither. They were hired to build relationships and &quot;be proactive,&quot; which is exactly the layer the agent just absorbed.</p>
      <p>If your CSM job could be done by an agent emailing 83 people at midnight, it was already a dead job. The agent didn&#x27;t kill it. It made it visible.</p>
      <hr>
      <h2>Before: the generalist who did everything badly because there wasn&#x27;t time</h2>
      <p>Picture the role as it actually ran for the last four years.</p>
      <p>You carried 40 accounts. Your Monday was an inbox of escalations, a sales handoff with no notes, two fire drills in Slack, and the one account threatening to leave this quarter. You wrote check-in emails between meetings. You prepped QBR decks at 9pm. You updated the CRM on Friday so the forecast looked clean.</p>
      <p>You called this proactive work and you were proud of it. The dashboard showed your outreach cadence in green.</p>
      <p>Here&#x27;s the quiet truth about that green dashboard. The proactive nudge got sent. Nobody acted on the insight inside it. The health alert fired and you saw it and you had no bandwidth to do anything except note that you&#x27;d seen it. &quot;Proactive&quot; was a measure of how many messages left your outbox, not how many problems you prevented.</p>
      <p>That&#x27;s the version of the job an agent replaces wholesale. And it should. It was theatre.</p>
      <hr>
      <h2>After: two jobs, and one of them is a trap</h2>
      <p>Now the agent runs the outbound, the CRM hygiene, the first-draft QBR, the renewal nudges. What&#x27;s left for the human is supposed to be &quot;the strategic part.&quot;</p>
      <p>That phrase is doing a lot of dangerous work. Because &quot;the strategic part&quot; actually contains three things, and only two of them are jobs.</p>
      <p><strong>Curation work, the supervisor.</strong> Judging, correcting, and approving what the agent sends before it damages a relationship. The agent drafts 40 check-ins over the weekend. Three of them are wrong in ways only a human who knows the account can catch: one references a feature the customer just deprecated, one congratulates a champion who got laid off Friday, one cheerfully asks for a renewal conversation the week after a Sev-1 outage. The supervisor catches those three. The supervisor is the reason the other 37 don&#x27;t erode trust.</p>
      <p><strong>Commercial work, the closer.</strong> Navigating the procurement freeze, the champion change, the security review, the multi-stakeholder budget fight. The politics. The negotiation. The crisis where the customer&#x27;s own change-advisory board won&#x27;t approve the fix the agent already flagged six weeks ago. No agent does this, because the bottleneck was never detecting the problem. The bottleneck is the human org on the customer&#x27;s side, and software can&#x27;t navigate a CAB.</p>
      <p>And then the third thing, which masquerades as a job:</p>
      <p><strong>The Babysitter Trap.</strong> Supervising agent output with no authority to change anything. You read the 40 emails the agent sent. You can&#x27;t unsend them. You can&#x27;t rewrite the cadence. You can flag a bad one but the workflow already shipped it. You sit in front of a queue of decisions the machine already made and your role is to feel responsible for them.</p>
      <p>That&#x27;s not supervision. That&#x27;s busywork you&#x27;re now liable for.</p>
      <hr>
      <h2>What a real supervisor needs that the trap denies them</h2>
      <p>The difference between a supervisor and a babysitter is a single word: authority.</p>
      <p>This isn&#x27;t abstract. Look at how most CS automation platforms ship today. The dominant design pattern is human-flags-after-send. The agent runs its sequence, the human gets a notification, and the human&#x27;s options are to acknowledge, to escalate, or to add a note. The send already happened. The customer already read it.</p>
      <p>That is the babysitter pattern hard-coded into a product. The human is positioned as a reviewer of completed actions, not an approver of pending ones. You&#x27;re accountable for output you couldn&#x27;t prevent.</p>
      <p>A supervisor role requires three powers the trap removes:</p>
      <p>1. <strong>Halt power.</strong> The ability to stop a send before it goes, not apologise for it after. Approval gates on anything touching a named risk account.</p>
      <p>2. <strong>Rewrite power.</strong> The ability to change the cadence, the segment logic, the message, when the human spots a pattern the agent can&#x27;t. Not file a ticket with the ops team. Change it.</p>
      <p>3. <strong>Override-with-consequence.</strong> When the supervisor corrects the agent, the correction trains the next run. If your overrides vanish into the void and the agent makes the same mistake next week, you&#x27;re a babysitter with a fancier title.</p>
      <p>When a vendor sells you &quot;human in the loop,&quot; ask exactly where the loop is. If the human enters the loop after the action completes, you didn&#x27;t buy supervision. You bought liability laundering.</p>
      <hr>
      <h2>The judgment ratio</h2>
      <p>Here&#x27;s the number that cuts through all of it.</p>
      <p>The <strong>judgment ratio</strong> is the share of a CSM&#x27;s week spent making decisions an agent cannot make, versus babysitting decisions it already made.</p>
      <p>Decisions an agent can&#x27;t make: the procurement strategy on a frozen renewal, the read on whether a quiet champion is disengaged or just busy, the call to escalate to the customer&#x27;s CIO, the judgment that this account needs a human on a plane and that one needs to be left alone. Supervisor and closer work.</p>
      <p>Decisions it already made: reading the 40 emails it sent, acknowledging the health alerts it generated, watching the dashboard refresh. Babysitter work.</p>
      <p>Divide the first by the total. That&#x27;s your judgment ratio.</p>
      <p>If it&#x27;s above 60 percent, you&#x27;ve redesigned the job. The human is doing what only a human can do and the agent is carrying the rest.</p>
      <p>If it&#x27;s below 40 percent, you haven&#x27;t built a CSM. You&#x27;ve built a babysitter, and you&#x27;re paying senior-CSM money for someone to feel responsible for a machine&#x27;s output. The org will eventually notice the cost and cut the role, and they&#x27;ll be right to, because the role you built genuinely had no judgment in it.</p>
      <p>The zone between 40 and 60 is where most teams will land this year. That&#x27;s the warning band. It means you bolted agents onto a dying job instead of designing a new one.</p>
      <p>Here is exactly what to count on Monday. Pull last week&#x27;s calendars and activity logs for three CSMs. Take every block, every logged task, and tag it with one of three labels: *agent-couldn&#x27;t*, *agent-already-did*, or *agent-could-have*. Sum the *agent-couldn&#x27;t* minutes. Divide by total working minutes. That&#x27;s the judgment ratio for that human, measured, not guessed.</p>
      <p>Do it for your best CSM and your most junior one. The spread will tell you whether your seniority maps to judgment or just to tenure.</p>
      <hr>
      <h2>The Supervisor / Closer Split, as an org-design decision</h2>
      <p>If the role bifurcates, you have to staff for the bifurcation. Pretending one generalist does both is how you end up with a team of expensive babysitters.</p>
      <p>Let me be honest about the evidence here. No enterprise CS org I can point to has formally re-titled its team into &quot;supervisors&quot; and &quot;closers&quot; yet. This is a prediction, not a press release. So let me make it falsifiable: within 18 months, the CS orgs that retain pricing power on their renewals will have explicitly separated agent-supervision headcount from commercial-ownership headcount, and the ones that didn&#x27;t will have flat or declining net revenue retention and a CFO asking why CS still costs what it does. If that doesn&#x27;t happen, I&#x27;m wrong and you can hold me to it.</p>
      <p>Here&#x27;s the shape I&#x27;d design toward.</p>
      <p><strong>The supervisor role.</strong> Pattern-literate, detail-obsessed, fluent in the product and the data. One supervisor can credibly oversee the agent output across a large book, because the agent is doing the volume. The span of control goes up, not down. Where a CSM carried 40 accounts of manual work, a supervisor oversees the agent&#x27;s coverage of 200-plus, intervening only on the corrections. You need fewer supervisors than you had generalist CSMs. That&#x27;s the headcount reduction leadership is actually chasing, and it&#x27;s legitimate, as long as it&#x27;s named honestly.</p>
      <p><strong>The closer role.</strong> Commercially fluent, politically aware, comfortable in a room with a CFO who wants to cut spend. The closer carries fewer accounts than the old generalist did, because each account demands more depth: the freeze, the champion change, the security review, the board-level renewal. This is a higher band than the supervisor. It overlaps with what good account executives and account managers do, and it should be comped closer to them.</p>
      <p>The ratio between them is the strategic call. A transactional, high-volume book skews toward supervisors. An enterprise book of complex, high-stakes accounts skews toward closers. Most orgs will need both, in different proportions per segment, and the failure mode is hiring one generalist band and asking them to flex between two jobs that require different people.</p>
      <p>Pay them differently. Title them differently. Measure them differently. The supervisor is measured on correction quality and the trust-cost of what shipped. The closer is measured on gross revenue retention and the outcomes they navigated. Do not put them both on the same NRR scorecard, because one of them barely touches NRR and the other one is held hostage by product pricing decisions they don&#x27;t control.</p>
      <hr>
      <h2>What I&#x27;d do this week</h2>
      <p>1. <strong>Run the judgment-ratio audit on three CSMs.</strong> Pull last week&#x27;s calendars, tag every block *agent-couldn&#x27;t / agent-already-did / agent-could-have*, compute the ratio. Below 40 percent on your senior people means you have a babysitter problem hiding behind senior titles.</p>
      <p>2. <strong>Audit your automation for the loop.</strong> For every agent action that touches a customer, find out whether the human can halt it before send or only react after. Every &quot;after-only&quot; workflow is a babysitter factory. Demand halt power, rewrite power, and override-with-consequence, or stop calling it supervision.</p>
      <p>3. <strong>Sort your current team into supervisor and closer.</strong> Not as a fixed identity, but as a question: which one is this person actually good at? Most generalists lean clearly one way. The ones who lean toward neither are the conversation you&#x27;ve been avoiding.</p>
      <p>4. <strong>Reprice the two roles before finance does it for you.</strong> Decide the headcount ratio per segment, the pay band for each, and the span of control for supervisors. If you don&#x27;t bring this design to your CFO, the CFO will bring you the Lemkin write-up and a number, and you&#x27;ll be defending headcount instead of proposing a structure.</p>
      <p>5. <strong>Stop comping closers on NRR.</strong> Put them on GRR, the floor they actually influence. Expansion is migrating to sales and to product upgrade prompts that convert better than any QBR. Comping CS on a number it half-controls is how you guarantee a blame conversation when the number moves for pricing reasons.</p>
      <hr>
      <p>Lemkin showed a working agent doing the operational core of a CSM&#x27;s job and called the role dead. He&#x27;s right that the job he was looking at is dead. He was looking at the administrative CSM, and that one was already terminal. QB just turned off the life support and forced everyone to watch.</p>
      <p>What he didn&#x27;t show, because his accounts don&#x27;t require it, is the closer navigating a procurement freeze or the supervisor halting a tone-deaf send to a grieving champion. Those jobs are not dead. They were always the actual job. The midnight emails were just the part we mistook for it.</p>
      <p>So run the audit. Get your number. Then decide, deliberately, which job you&#x27;re building, because the org chart is going to decide for you if you don&#x27;t.</p>
      <p>What&#x27;s your judgment ratio?</p>
