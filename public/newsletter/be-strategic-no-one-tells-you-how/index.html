      <h1 style="font-family:Helvetica,Arial,sans-serif;font-size:32px">Everyone Says “Be Strategic.” No One Tells You How.</h1>
      <p style="color:#999;font-size:13px">6 min read · Outcomes</p>
      <p>&quot;Be strategic.&quot;</p>
      <p>&quot;Focus on outcomes.&quot;</p>
      <p>&quot;Don’t just do tasks, drive value.&quot;</p>
      <p>&quot;CSMs who don’t use AI will be replaced by those who do.&quot;</p>
      <p>You’ve seen these posts. I have too. Over and over again.</p>
      <p>They sound inspiring the first time.</p>
      <p>By the tenth, they feel like copy-paste advice with no playbook.</p>
      <hr>
      <p>I used to believe them at face value.</p>
      <p>I remember being on a call early in my CS journey, trying to sound “strategic” because that’s what everyone said good CSMs do.</p>
      <p>Only problem?</p>
      <p>The person on the call was a support admin who just wanted help with configuration. No exec. No context. No goals.</p>
      <p>I left that call thinking I’d failed and I had.</p>
      <p>Not because I wasn’t “strategic” enough but because I didn’t yet know how to meet customers where they were, or how to connect the tactical to something bigger.</p>
      <p>That was the turning point.</p>
      <p>Because no one teaches you how to actually navigate this stuff:</p>
      <ul>
      <li>Who to ask for KPIs (and how to do it without sounding robotic)</li>
      <li>What to do when you&#x27;re only speaking with mid-level contacts</li>
      <li>How to actually tie activities to outcomes in a way that makes sense</li>
      </ul>
      <p>We don’t need more mantras.</p>
      <p>We need methods.</p>
      <p>We need to be honest about the messy middle between check-ins and strategic outcomes.</p>
      <hr>
      <h2>Strategy vs. Tactics is a False Choice</h2>
      <p>One of the most repeated pieces of advice in Customer Success right now is:</p>
      <blockquote>“Stop being tactical. Start being strategic.”</blockquote>
      <p>But here’s the truth I&#x27;ve learned firsthand:</p>
      <p>Every strategic win I’ve ever had was built on doing the basics exceptionally well.</p>
      <hr>
      <p>Early in my career, I was in Application Support. My whole job was reactive: waiting for issues, checking logs, escalating tickets.</p>
      <p>Our customer was a major newsroom, critical, fast-paced, high-stakes. And the software simply had to work.</p>
      <p>But I had a thought one day:</p>
      <blockquote>*“What if instead of waiting for issues, I proactively asked the users themselves what’s working, what’s broken, and what’s just frustrating?”*</blockquote>
      <p>No one called this “Customer Success” yet, but that’s exactly what I was doing.</p>
      <p>I started talking to newsroom operators, directors, and even the production teams.</p>
      <p>I asked simple questions like:</p>
      <ul>
      <li>What do you love about the platform?</li>
      <li>What do you absolutely hate?</li>
      <li>What wastes your time?</li>
      <li>What efficiencies are you desperately chasing?</li>
      </ul>
      <p>It turned out these tactical, operational conversations were exactly where the strategic insight lived.</p>
      <hr>
      <p>After a series of workshops, I distilled their feedback down to:</p>
      <ul>
      <li>5 things they loved (but could still be improved)</li>
      <li>5 things they hated (that slowed down their workflow)</li>
      <li>5 wishlist items that would make their lives easier</li>
      </ul>
      <p>Management was receptive because they saw the potential impact.</p>
      <p>Within six months, we:</p>
      <ul>
      <li>Enhanced the 5 features they already liked, making them even more valuable.</li>
      <li>Eliminated 4 out of the 5 things they hated.</li>
      <li>Delivered 3 brand new capabilities directly from their wishlist.</li>
      </ul>
      <hr>
      <p>Suddenly, those tactical conversations had created measurable strategic outcomes.</p>
      <p>When I caught up with the customers again, something had shifted dramatically.</p>
      <p>Operators told their management about tangible efficiency gains.</p>
      <p>News anchors literally felt the difference on air, asking:</p>
      <blockquote>*“Did we switch products? Everything feels smoother.”*</blockquote>
      <p>That moment taught me something powerful:</p>
      <hr>
      <blockquote>**Tasks aren’t the enemy of strategy. They’re the foundation.**</blockquote>
      <blockquote>**Tactical success directly enables strategic outcomes.**</blockquote>
      <p>So let’s stop criticizing CSMs for “doing tasks.”</p>
      <p>Instead, let’s help them connect every task to strategic impact because the truth is:</p>
      <blockquote>**Strategy doesn’t replace tactics. It elevates them.**</blockquote>
