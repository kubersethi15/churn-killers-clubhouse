      <p style="font-size:11px;letter-spacing:3px;color:#C8553D;font-weight:bold;text-transform:uppercase">CHURN IS DEAD</p>
      <h1 style="font-family:Helvetica,Arial,sans-serif;font-size:32px">The Two-Vendor Trick: How CS Platforms Quietly Became Org Charts You Can&#x27;t Edit</h1>
      <p style="color:#999;font-size:13px">11 min read · Operations</p>
      <p>In 2024, Totango and Catalyst merged into one company. Two years on, they still ship as two distinct products under one logo, with two data models, two onboarding paths, two histories of how a &quot;health score&quot; gets calculated.</p>
      <p>If your CS team runs on one of them, here&#x27;s a question worth sitting with before your next renewal: do you actually know which of the two your daily workflow lives in? And if your answer is &quot;does it matter&quot; — that&#x27;s the whole problem, named in one shrug.</p>
      <p>This isn&#x27;t a Totango story. Gainsight has acquired and bolted on enough products over the years that its data model carries the geology of every deal it ever closed. ChurnZero, Planhat, Vitally each grew from a different first principle about what a customer success motion even is. None of them are neutral. None of them ship empty.</p>
      <p>Every one of them ships with an opinion about how your team should work. And the day you adopted it, that opinion quietly started becoming your operating model.</p>
      <p>You think you bought a system of record. You bought a system of constraint.</p>
      <hr>
      <h2>The thing nobody re-examines at renewal</h2>
      <p>Walk through a renewal cycle for a $200K CS platform. The CS Ops lead pulls usage stats. Someone confirms adoption is &quot;healthy.&quot; Finance asks if there&#x27;s a cheaper tier. Procurement negotiates 8% off. The VP signs.</p>
      <p>Nobody asks the only question that matters: how much of how we work exists because we chose it, versus because the tool made it the easiest path?</p>
      <p>That question never gets asked because the people who could ask it have stopped seeing the tool. It&#x27;s furniture now. It&#x27;s the room they work in, not an object in the room. You don&#x27;t audit the floor you&#x27;re standing on.</p>
      <p>So you re-sign. And in re-signing, you re-buy a thousand small decisions you never actually made. The vendor&#x27;s definition of &quot;at-risk.&quot; The vendor&#x27;s idea of what a lifecycle stage is. The vendor&#x27;s notion of which fields are worth filtering on, which silently became your segmentation strategy.</p>
      <p>That&#x27;s not renewing a tool. That&#x27;s renewing an org chart you&#x27;ve never been allowed to edit.</p>
      <hr>
      <h2>Tenancy, not ownership</h2>
      <p>Most CS leaders believe they own their platform. They own a login and a renewal obligation. The platform owns the shape of the team.</p>
      <p>Here&#x27;s the test that exposes it. List your last five operational decisions about how your CS team works. How you define a healthy account. How you tier your book. What triggers an intervention. What a CSM is expected to do in week one of a new account. How you measure success.</p>
      <p>Now check each one: could you change it tomorrow without filing a vendor ticket, waiting on a Professional Services scope, or being told &quot;that&#x27;s not how the platform handles it&quot;?</p>
      <p>Every decision that fails that test isn&#x27;t yours. It&#x27;s the vendor&#x27;s, and you&#x27;re renting it back from them every year.</p>
      <p>The share of your operating model that exists because the tool ships that way, rather than because you chose it, is your <strong>Vendor-Default Ratio</strong>. You can&#x27;t read it off a dashboard. You compute it by running the test above across your core operating decisions and counting how many you can&#x27;t change without permission.</p>
      <p>Most leaders have never run it. Which means most leaders are paying rent on their own strategy and have it filed under &quot;software.&quot;</p>
      <hr>
      <h2>The Frozen Layer</h2>
      <p>The place where this calcifies is what I call <strong>the Frozen Layer</strong>: the band of your operating model that has hardened into vendor defaults so completely that you&#x27;ve stopped experiencing it as a choice.</p>
      <p>It freezes in four places. Here&#x27;s where to dig.</p>
      <h3>Definitions: who decided what &quot;healthy&quot; means?</h3>
      <p>I sat with a CS Ops lead at a data-integration company who walked me through their health score with real pride. Login frequency, feature breadth, support ticket volume, all weighted, all green across the enterprise book.</p>
      <p>Then I asked what login frequency meant for their product. It turned out their product was an integration layer. The whole point of it working well was that nobody logged in. It ran in the background, moving data between systems. A customer logging in daily was a customer whose pipeline was breaking.</p>
      <p>Three of their largest accounts were green. All three had admins who&#x27;d stopped touching the tool because it was finally stable, which the score read as engagement decline, which their playbook routed to &quot;educate the user.&quot; Meanwhile the actual risk — that a stable, invisible product is the easiest line item to cut when a CIO goes hunting for spend — was a signal the platform had no field for.</p>
      <p>The health score wasn&#x27;t measuring their customers&#x27; health. It was measuring the vendor&#x27;s generic assumption that logins equal love. They&#x27;d inherited a definition built for a seat-based SaaS product and applied it to an integration product where the same signal meant the opposite thing.</p>
      <p>That&#x27;s the <strong>Definitions Layer</strong>. The most dangerous frozen decisions are the ones that arrive disguised as obvious. &quot;Healthy means engaged.&quot; &quot;At-risk means declining usage.&quot; &quot;Enterprise means over X seats.&quot; These feel like physics. They&#x27;re product defaults, written by people who never met your customer.</p>
      <p>They rebuilt the score around &quot;is the integration moving data without errors&quot; and added a renewal-exposure flag for stable-but-invisible accounts. It took a quarter and a fight with the platform&#x27;s scoring logic. The point isn&#x27;t the fix. The point is they&#x27;d run for three years inside someone else&#x27;s definition of their own business and called it a strategy.</p>
      <h3>Workflow: which motions are right, and which are just easy?</h3>
      <p>Tools have grain. Some paths are smooth and some cut against the wood, and over time a team migrates toward the smooth ones whether or not they&#x27;re the right ones.</p>
      <p>That&#x27;s mostly harmless until you notice what it costs. The motion your tool makes easiest becomes the motion your team runs by default, and that default becomes &quot;how we do CS here,&quot; and eventually someone writes it into the onboarding deck for new hires as if it were a deliberate philosophy.</p>
      <p>The tell: ask a CSM why they run a particular play in a particular sequence. If the honest answer is &quot;because that&#x27;s the order the screens are in,&quot; you&#x27;ve found a frozen workflow. The platform&#x27;s information architecture became your operating procedure, and nobody chose it. It just had the lowest friction.</p>
      <p>The <strong>Workflow Layer</strong> is where your team&#x27;s habits and the tool&#x27;s grain become indistinguishable. Untangling them is uncomfortable, because half the time the easy path was also the right one and you can&#x27;t tell which half until you look.</p>
      <h3>Segmentation: are your tiers a choice or a side effect?</h3>
      <p>How do you tier your accounts? Most leaders will give you a strategic-sounding answer about value, potential, and risk.</p>
      <p>Then watch how the tiers are actually built in the system. They&#x27;re built on the fields the platform lets you filter and group on. ARR band, because there&#x27;s a field for it. Industry, because there&#x27;s a dropdown. Renewal date, because it&#x27;s structured data.</p>
      <p>The dimensions that might actually predict who deserves what level of attention — stakeholder fragility, executive sponsor strength, how deeply the product is wired into a critical workflow — those rarely have clean fields, so they rarely make it into the segmentation. You tier on what&#x27;s filterable, not on what&#x27;s strategic, and the gap between those two is a decision the vendor made for you.</p>
      <p>The <strong>Segmentation Layer</strong> is where your tool&#x27;s schema quietly writes your coverage model. You staff your highest-touch motion against the accounts the platform makes easiest to group, and call it strategy. It&#x27;s data-model convenience wearing a strategy costume.</p>
      <h3>Exit: how much survives a migration?</h3>
      <p>Here&#x27;s the layer that makes the other three real. If you offboarded your CS platform in 90 days and migrated to a blank one, how much of your operating model would survive?</p>
      <p>Not the data. The data migrates. I mean the thinking. Your definition of health, expressed cleanly enough to rebuild in any tool. Your tiering logic, written down somewhere that isn&#x27;t a saved view. Your intervention triggers, documented as decisions rather than as automations nobody can explain.</p>
      <p>For most teams the honest answer is: not much. Strip away the platform and you&#x27;d discover that a large share of &quot;how we run CS&quot; was never an articulated operating model at all. It was a set of configurations, and the reasoning behind them left the building with the implementation consultant two years ago.</p>
      <p>The <strong>Exit Layer</strong> is the truest measure of your Vendor-Default Ratio. The portion of your operating model that couldn&#x27;t survive a migration is, by definition, the portion the vendor owns. You&#x27;ve just never had to look at it because you&#x27;ve never tried to leave.</p>
      <hr>
      <h2>Why this bites hardest right now</h2>
      <p>For years a frozen platform was an annoyance, not a crisis. Your model could afford to be rigid because the problem it solved was stable. You were retaining customers, and the schema was tuned for retention. Green meant safe.</p>
      <p>That&#x27;s no longer true. The industry-wide data says gross retention is holding while net revenue retention is falling. Customers are staying and not expanding. The problem has moved from &quot;are they leaving&quot; to &quot;why aren&#x27;t they growing,&quot; and those are different questions that demand different definitions of a healthy account, different segments, different motions.</p>
      <p>Which means the exact moment your operating model most needs to change is the moment your frozen platform is least able to let it. You need to re-define health to catch the renewed-but-shrinking account. You need to re-tier around expansion potential rather than retention risk. You need new triggers.</p>
      <p>And every one of those changes runs straight into a schema that was hardcoded for the problem you used to have.</p>
      <p>A frozen platform is a tax you don&#x27;t notice until the day you need to turn the wheel and find it welded straight.</p>
      <hr>
      <h2>The audit, before you sign</h2>
      <p>You don&#x27;t fix a frozen layer by switching vendors. You&#x27;ll just freeze again in a new schema. You fix it by separating your operating model from your tool, on paper, before you renew. Run this:</p>
      <p>1. <strong>Write your definitions down, tool-free.</strong> Define healthy, at-risk, and enterprise in plain language, the way they should be true for your product and your customer. Do it on a blank page. Then compare that page to what your platform actually computes. Every gap is a frozen definition you&#x27;ve been renting.</p>
      <p>2. <strong>Trace five workflows to their origin.</strong> Pick five things your CSMs do every week. For each, ask why it runs that way. Sort honestly into &quot;because it&#x27;s right&quot; and &quot;because it&#x27;s the path of least resistance.&quot; The second pile is your Workflow Layer, and it&#x27;s bigger than you&#x27;d like.</p>
      <p>3. <strong>Rebuild your tiers from strategy, not from fields.</strong> Write the dimensions that should determine coverage. Now check which ones your platform can actually segment on. Where strategy and schema disagree, your schema has been winning, and you&#x27;ve been calling the result a tiering model.</p>
      <p>4. <strong>Run the 90-day exit test on paper.</strong> For each core piece of your model, ask: would this survive a migration to a blank tool? Count what wouldn&#x27;t. That count, over your total, is your Vendor-Default Ratio. Don&#x27;t guess at a percentage. Compute it from the list.</p>
      <p>5. <strong>Renew against the gap, not the discount.</strong> Take the frozen items into your renewal conversation. Ask the vendor, specifically, which of them you can change yourself and which require Professional Services. The answer tells you exactly how much org chart you&#x27;re re-buying, and at what price.</p>
      <p>The goal isn&#x27;t a Vendor-Default Ratio of zero. Some defaults are fine. A platform that imposes nothing imposes no leverage either. The goal is to know your number, so that when you sign for another year you&#x27;re choosing the constraints instead of inheriting them.</p>
      <hr>
      <p>The Totango and Catalyst question I opened with isn&#x27;t really about Totango. It&#x27;s about the gap between believing you run a tool and the tool running you, and how invisible that gap stays until someone makes you look.</p>
      <p>Most CS leaders will renew this quarter without running this audit. They&#x27;ll get the 8% discount and the warm feeling of a clean procurement cycle. And they&#x27;ll re-sign for another year inside a definition of &quot;healthy&quot; they never wrote, a tiering model their data fields chose, and a workflow their CSMs follow because of the order of the screens.</p>
      <p>Before you renew, find out which decisions in your CS function are actually yours. My guess is fewer than you&#x27;d be comfortable putting in writing. The discomfort is the point. That&#x27;s the number you&#x27;ve been managing a team by without ever being allowed to see it.</p>
