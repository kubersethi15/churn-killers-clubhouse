      <p style="font-size:11px;letter-spacing:3px;color:#C8553D;font-weight:bold;text-transform:uppercase">CHURN IS DEAD</p>
      <h1 style="font-family:Helvetica,Arial,sans-serif;font-size:32px">Customer Success Doesn&#x27;t Deserve to Survive</h1>
      <p style="color:#999;font-size:13px">6 minutes · Strategy</p>
      <h2>The Function That Watched Itself Die</h2>
      <p>Last month, Workday gutted 400 people from their Global Customer Operations team. Not sales. Not engineering. Customer operations.</p>
      <p>Their official reason? &quot;Realigning resources toward high-growth areas.&quot;</p>
      <p>Translation: We&#x27;re moving money away from humans who manage customers and toward AI and revenue-generating roles.</p>
      <p>A week earlier, Salesforce quietly cut thousands—with customer support roles specifically in the crosshairs.</p>
      <p>The CS community responded exactly how you&#x27;d expect. LinkedIn erupted with the usual chorus:</p>
      <blockquote>&quot;CS is more important than ever!&quot;</blockquote>
      <blockquote>&quot;Companies will regret this!&quot;</blockquote>
      <blockquote>&quot;We just need to prove our value!&quot;</blockquote>
      <p>And here&#x27;s the part nobody wants to hear:</p>
      <p><strong>Most CS teams don&#x27;t deserve to survive.</strong></p>
      <hr>
      <h2>This Is Not a Layoff Problem. This Is a Credibility Problem.</h2>
      <p>Let me be very clear about what I&#x27;m saying. I&#x27;m not arguing that customer success as a *concept* is dead. Helping customers achieve outcomes is obviously critical. That&#x27;s not going away.</p>
      <p>What I am saying is that the way most CS teams operate—the way they&#x27;re structured, the way they measure themselves, the way they spend their days—has been a slow-moving credibility crisis for over a decade.</p>
      <p>And the layoffs aren&#x27;t an injustice. They&#x27;re a market correction.</p>
      <p>Here&#x27;s what a typical CSM&#x27;s week looks like at most SaaS companies:</p>
      <ul>
      <li>Monday: Internal standups about customer health scores that nobody trusts</li>
      <li>Tuesday: QBR prep—pulling screenshots from dashboards the customer could pull themselves</li>
      <li>Wednesday: &quot;Check-in&quot; calls where the customer politely wonders why they&#x27;re on this call</li>
      <li>Thursday: Chasing product for a feature request update that won&#x27;t happen this quarter</li>
      <li>Friday: Logging notes into a CRM that nobody reads</li>
      </ul>
      <p>Now tell me: which part of that is *irreplaceable*?</p>
      <p>Which part of that justifies a six-figure salary?</p>
      <p>Which part of that makes a CFO look at the CS line item and say, &quot;We absolutely cannot cut this&quot;?</p>
      <p>The uncomfortable answer is: almost none of it.</p>
      <hr>
      <h2>The Three Lies CS Tells Itself</h2>
      <h3>Lie #1: &quot;We own the relationship.&quot;</h3>
      <p>No, you don&#x27;t. The product owns the relationship. If your product disappeared tomorrow and you called the customer to chat, they wouldn&#x27;t pick up. You are an intermediary, and intermediaries get disintermediated.</p>
      <p>The CS teams that survive understand this. They don&#x27;t &quot;own&quot; the relationship—they *shape* the decisions customers make about the product. There&#x27;s a massive difference.</p>
      <h3>Lie #2: &quot;We prevent churn.&quot;</h3>
      <p>Show me. Specifically, show me the customer that was going to churn, and the exact action you took that saved them, and the revenue number attached to that save. If you can&#x27;t do this for at least 60% of your accounts, you&#x27;re not preventing churn. You&#x27;re monitoring it and hoping for the best.</p>
      <p>Most &quot;churn prevention&quot; in CS is really just &quot;churn detection after it&#x27;s too late.&quot; The customer decided to leave six months ago. You found out two weeks before renewal. That&#x27;s not prevention. That&#x27;s a funeral arrangement.</p>
      <h3>Lie #3: &quot;We need a seat at the table.&quot;</h3>
      <p>This one hurts the most because it&#x27;s been the rallying cry of CS leaders for years. But here&#x27;s what nobody says: you don&#x27;t *earn* a seat at the table by asking for one. You earn it by making decisions that move revenue.</p>
      <p>Engineering doesn&#x27;t ask for a seat at the table. Sales doesn&#x27;t ask. Finance doesn&#x27;t ask. They sit there because removing them from the conversation would break something.</p>
      <p>If removing CS from the conversation wouldn&#x27;t break anything, that&#x27;s not a political problem. That&#x27;s an *impact* problem.</p>
      <hr>
      <h2>So What Does a CS Team That Deserves to Survive Look Like?</h2>
      <p>I&#x27;ve spent the last year studying this—inside my own enterprise accounts and across conversations with CS leaders running teams in some of the most complex environments in the world. Public sector. Cybersecurity. Infrastructure. Places where a single renewal can be worth millions and the implementation timeline is measured in years, not weeks.</p>
      <p>The teams that are untouchable—the ones no CFO would dream of cutting—share five characteristics that I&#x27;m packaging into what I call the <strong>Survival Framework.</strong></p>
      <h3>The CS Survival Framework: 5 Non-Negotiables</h3>
      <p><strong>1. Revenue Attribution, Not Revenue Adjacency</strong></p>
      <p>Surviving CS teams can point to specific dollars they influenced. Not &quot;we supported the renewal.&quot; Not &quot;we were involved in the expansion conversation.&quot; They can say: &quot;This customer was going to consolidate vendors and cut us. I ran a business impact analysis that showed $2.3M in operational risk if they migrated. The customer renewed for three years.&quot;</p>
      <p>That&#x27;s attribution. Everything else is adjacency—being near the revenue without causing it. Adjacency gets cut.</p>
      <p>[ACTION] For every account in your book, write one sentence that starts with &quot;Because of my specific involvement, this customer...&quot; If you can&#x27;t finish that sentence with a measurable outcome, you have a gap. [/ACTION]</p>
      <p><strong>2. Technical Credibility, Not Just Relationship Warmth</strong></p>
      <p>The Custify 2026 CS trends report nailed this: &quot;Products are more complex, integrations are deeper, and customers expect CS to understand architecture, not just workflows.&quot; In enterprise environments, your customer&#x27;s technical team will test you. If you can&#x27;t speak their language—if you can&#x27;t understand why their Splunk instance is over-provisioned, or why their SOAR deployment has visibility gaps—you become a scheduling coordinator with a nicer title.</p>
      <p>Surviving CS teams invest in technical depth. They can sit in an architecture review and add value. They can challenge a customer&#x27;s implementation approach because they&#x27;ve seen what works and what doesn&#x27;t across dozens of similar environments.</p>
      <p>[ACTION] Identify the three most technically complex aspects of your product&#x27;s deployment. Can you explain them to a customer&#x27;s engineering team without bringing in a solutions engineer? If not, that&#x27;s your learning plan for the next 90 days. [/ACTION]</p>
      <p><strong>3. Customer Decision Shaping, Not Customer Relationship Managing</strong></p>
      <p>Here&#x27;s the litmus test: Did a customer make a different decision because of your input?</p>
      <p>Not a different *feeling*. A different *decision*. Did they expand into a new use case because you showed them what was possible? Did they restructure their team&#x27;s workflow because you recommended it? Did they choose to stay because you reframed the value in business terms their CFO understood?</p>
      <p>Surviving CS teams are in the business of shaping decisions. Dying CS teams are in the business of maintaining vibes.</p>
      <p>[ACTION] After every meaningful customer interaction, ask yourself: &quot;What will this customer do differently as a result of this conversation?&quot; If the answer is &quot;nothing different,&quot; the conversation was a waste of both your time. [/ACTION]</p>
      <p><strong>4. Veto Power, Not Just Responsibility</strong></p>
      <p>One of the sharpest observations from this year&#x27;s CS discourse: &quot;CS is often asked to compensate for weak qualification and inflated promises. That&#x27;s not strategy—that&#x27;s damage control.&quot;</p>
      <p>Surviving CS teams push back upstream. They have the authority—or they&#x27;ve built the credibility—to say &quot;this deal is going to be a disaster and here&#x27;s why&quot; before it closes. They reject bad-fit customers. They challenge unrealistic timelines. They make sales uncomfortable when necessary.</p>
      <p>If your CS team inherits every deal regardless of fit and then gets blamed for churn, you don&#x27;t have a CS problem. You have an organizational design problem. And surviving CS leaders are the ones brave enough to name it.</p>
      <p>[ACTION] Review your last five churned customers. How many were bad fits from day one? Build a &quot;deal health&quot; criteria that CS uses to flag risk before implementation begins. Present it to your CRO. [/ACTION]</p>
      <p><strong>5. Proof of Absence, Not Presence</strong></p>
      <p>This is the most counterintuitive one. Most CS teams prove their value by showing what they *do*—calls logged, QBRs delivered, emails sent. Activity metrics.</p>
      <p>Surviving CS teams prove their value by showing what would *break* if they disappeared. They&#x27;re embedded so deeply in the customer&#x27;s operational workflow that removing them creates a gap. Not an emotional gap. An operational gap.</p>
      <p>When your customer&#x27;s team says &quot;We can&#x27;t run our quarterly security review without our CSM&#x27;s framework&quot; or &quot;Our entire monitoring strategy was built on the architecture our CS engineer recommended&quot;—that&#x27;s proof of absence. That&#x27;s what makes you uncuttable.</p>
      <p>[ACTION] For your top 10 accounts, answer this: &quot;If I vanished tomorrow, what specific operational process would break for this customer?&quot; If nothing would break, you&#x27;re replaceable. Start building something that would. [/ACTION]</p>
      <hr>
      <h2>The Hard Truth for CS Leaders</h2>
      <p>If you&#x27;re running a CS team right now, here&#x27;s the question that should keep you up at night:</p>
      <p>If your CEO walked in tomorrow and said &quot;Justify every headcount on your team with specific, measurable revenue impact,&quot; could you do it?</p>
      <p>Not with stories about relationships. Not with NPS scores. Not with health dashboards. With dollars.</p>
      <p>The CS leaders who can answer that question will thrive in 2026 and beyond. They&#x27;ll hire more people, not fewer. They&#x27;ll get bigger budgets. They&#x27;ll get their seat at the table—without having to ask for it.</p>
      <p>The ones who can&#x27;t? The layoffs aren&#x27;t coming for them.</p>
      <p>The layoffs are already here.</p>
      <hr>
      <h2>Your Survival Playbook</h2>
      <p>I&#x27;ve turned the CS Survival Framework into a complete diagnostic and implementation guide that you can run on your own team this week.</p>
      <p><strong>The CS Survival Audit includes:</strong></p>
      <ul>
      <li><strong>Revenue Attribution Scorecard</strong> — Map every account to specific, measurable CS-driven outcomes</li>
      <li><strong>Technical Credibility Assessment</strong> — Identify and close the gaps in your product knowledge</li>
      <li><strong>Decision Impact Tracker</strong> — A template to measure whether your customer interactions actually change behavior</li>
      <li><strong>Upstream Influence Checklist</strong> — How to build veto power and flag bad-fit deals before they become your problem</li>
      <li><strong>Proof of Absence Diagnostic</strong> — The exercise that reveals whether your team is truly embedded or just present</li>
      </ul>
      <hr>
      <p>*The function isn&#x27;t dead. But the version of it that hides behind relationships and hopes nobody asks hard questions? That part needs to die.*</p>
      <p>*— Kuber*</p>
