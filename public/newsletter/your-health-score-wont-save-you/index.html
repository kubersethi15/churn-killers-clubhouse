    <div style="max-width:680px;margin:40px auto;padding:0 16px;font-family:Georgia,serif;line-height:1.7;color:#1a1a1a">
      <p style="font-size:11px;letter-spacing:3px;color:#C8553D;font-weight:bold;text-transform:uppercase">CHURN IS DEAD</p>
      <h1 style="font-family:Helvetica,Arial,sans-serif;font-size:32px">Your Health Score Won’t Save You</h1>
      <p style="color:#999;font-size:13px">4 minutes · Trust</p>
      <p>I’ve sat in too many QBRs where the slide said <strong>Green</strong> and the room felt <strong>Red</strong>.</p>
      <p>Logins looked fine.</p>
      <p>Feature adoption was “on track”.</p>
      <p>NPS was a cute little 8.</p>
      <p>And yet the exec sponsor was cold.</p>
      <p>Short answers.</p>
      <p>Camera off.</p>
      <p>“Let’s keep this one tight, I’ve got another call.”</p>
      <p>Three months later:</p>
      <blockquote>“We’ve decided not to renew.”</blockquote>
      <p>The health score didn’t miss it.</p>
      <p>It was <strong>never designed</strong> to see it.</p>
      <hr>
      <h2>The problem: your health score is scoring the wrong thing</h2>
      <p>Most health scores were built like this:</p>
      <ul>
      <li>Logins? +10</li>
      <li>Number of features used? +5</li>
      <li>CSAT positive? +10</li>
      <li>Last QBR in the quarter? +5</li>
      </ul>
      <p>Congratulations.</p>
      <p>Your customer is “healthy”.</p>
      <p>But here’s what that score never sees:</p>
      <ul>
      <li>The new CFO who hates your price.</li>
      <li>The program sponsor who just left.</li>
      <li>The quiet side-deal your competitor is running with procurement.</li>
      <li>The fact that your product is now “just good enough” and no one is emotionally invested in it.</li>
      </ul>
      <p>Usage is a <strong>signal</strong>.</p>
      <p>It’s not the <strong>story</strong>.</p>
      <p>And when the board asks,</p>
      <p>“Which customers are truly safe and which ones are volatile?”</p>
      <p>your health score can’t answer.</p>
      <p>Because it was built to measure activity,</p>
      <p>not <strong>predictability</strong>.</p>
      <hr>
      <h2>Predictability &gt; Health</h2>
      <p>When I talk about <strong>Customer Predictability</strong>, I’m not asking:</p>
      <blockquote>“Is this customer happy right now?”</blockquote>
      <p>I’m asking:</p>
      <blockquote>“How likely is this customer to behave the way we expect in the next 3–6–12 months?”</blockquote>
      <p>Will they:</p>
      <ul>
      <li>Renew at the current level?</li>
      <li>Expand into the next product or use case?</li>
      <li>Stall, regress, or quietly exit?</li>
      </ul>
      <p>That’s a very different question.</p>
      <p>To get there, you need to stop obsessing over whether the account is <strong>Green</strong> today</p>
      <p>and start understanding its <strong>trajectory</strong>.</p>
      <p>I look at three big lenses:</p>
      <p>1. <strong>Direction</strong> – Is the account moving toward growth, stability, or risk?</p>
      <p>2. <strong>Depth</strong> – How deep is our value + relationship beyond 1–2 champions?</p>
      <p>3. <strong>Dynamics</strong> – What’s changing in their world that could flip the table on us?</p>
      <p>If you only track logins and license consumption,</p>
      <p>you miss all three.</p>
      <hr>
      <h2>The three lenses of a predictable customer</h2>
      <p>Let’s break those down into something you can actually use.</p>
      <h3>1. Direction: are we drifting or compounding?</h3>
      <p>Ask:</p>
      <ul>
      <li>Are new use cases being added, or are we still talking about the same two dashboards from go-live?</li>
      <li>Are we getting invited earlier into conversations, or only when things break?</li>
      <li>Are execs more present in our cadence, or are we slowly sliding down to “just the admin”?</li>
      </ul>
      <p>Direction shows up in <strong>momentum</strong>:</p>
      <ul>
      <li>Expanding stakeholders.</li>
      <li>Bigger problems.</li>
      <li>Broader surface area of impact.</li>
      </ul>
      <p>If your deck looks the same every quarter,</p>
      <p>the direction is not growth.</p>
      <p>It’s stagnation with good manners.</p>
      <hr>
      <h3>2. Depth: how replaceable are we?</h3>
      <p>Depth is about how <strong>hard</strong> it would be to rip you out.</p>
      <p>It’s not:</p>
      <ul>
      <li>“They like us.”</li>
      <li>“We’ve been there for years.”</li>
      </ul>
      <p>It’s:</p>
      <ul>
      <li>How many teams would scream if we were switched off?</li>
      <li>What critical decisions depend on our data, alerts, or workflows?</li>
      <li>If our champion left tomorrow, would the account survive on autopilot?</li>
      </ul>
      <p>Shallow depth is a single power user and a one-page renewal.</p>
      <p>Real depth is when your product is <strong>wired into</strong>:</p>
      <ul>
      <li>Business reviews</li>
      <li>Risk conversations</li>
      <li>Board decks</li>
      <li>Incident process</li>
      <li>Forecasting</li>
      </ul>
      <p>Depth is where expansion starts <strong>feeling obvious</strong>, not forced.</p>
      <hr>
      <h3>3. Dynamics: what’s about to hit this account?</h3>
      <p>This is where almost every health score is blind.</p>
      <p>Dynamics = <strong>change</strong> inside the customer:</p>
      <ul>
      <li>New leadership (CFO/CIO/CTO/Head of Ops)</li>
      <li>M&amp;A events or divestments</li>
      <li>Budget resets and “tool consolidation” programs</li>
      <li>Strategic pivots (“we’re going upmarket”, “we’re cutting SMB”)</li>
      <li>Vendor standardisation</li>
      </ul>
      <p>These are the moments when a “healthy” customer suddenly becomes a churn story.</p>
      <p>If you’re not tracking internal and external dynamics,</p>
      <p>you’re not doing health scoring.</p>
      <p>You’re doing <strong>weather reporting</strong>.</p>
      <hr>
      <h2>How to rebuild your health model in 30 days</h2>
      <p>You don’t need a 12-month project to fix this.</p>
      <p>Here’s a simple path:</p>
      <h3>Step 1: Kill the vanity score</h3>
      <p>Don’t overcomplicate it.</p>
      <p>For every account in your top segment, answer:</p>
      <ul>
      <li><strong>Direction:</strong> Growing / Flat / Shrinking</li>
      <li><strong>Depth:</strong> Shallow / Medium / Deep</li>
      <li><strong>Dynamics:</strong> Stable / Shifting / Volatile</li>
      </ul>
      <p>You can literally do this in a spreadsheet or a simple table in your CRM.</p>
      <p>The important part is the <strong>conversation</strong>, not the UI.</p>
      <hr>
      <h3>Step 2: Add real human signals</h3>
      <p>Update your account views to include:</p>
      <ul>
      <li>Last meaningful exec interaction (not just “met at conference”)</li>
      <li>Org changes you know about (promotions, new hires, exits)</li>
      <li>Political and vendor landscape (who else is in the room and why)</li>
      <li>Silence patterns: when was the last time they <strong> proactively </strong> reached out?</li>
      </ul>
      <p>Silence is a signal.</p>
      <p>Lack of complaints is not safety.</p>
      <p>It’s often the pre-read to an RFP.</p>
      <hr>
      <h3>Step 3: Tie everything back to 3 business outcomes</h3>
      <p>Pick <strong>three outcomes</strong> that matter most for your product.</p>
      <p>Example:</p>
      <p>1. Reduced incident or outage impact</p>
      <p>2. Faster project delivery / change cycles</p>
      <p>3. Revenue or margin protection</p>
      <p>Then ask, account by account:</p>
      <ul>
      <li>Where have we <strong>proved</strong> one of these?</li>
      <li>Where are we still <strong>promising</strong> it?</li>
      <li>Where have we <strong>lost the narrative</strong>?</li>
      </ul>
      <p>If you can’t map your work to any outcome,</p>
      <p>that account is not predictable.</p>
      <p>It’s fragile, no matter how many features they click.</p>
      <hr>
      <h3>Step 4: Build a single “Predictability View” per account</h3>
      <p>For each strategic customer, I’d rather see <strong>one page</strong> that answers:</p>
      <p>1. What direction are they heading?</p>
      <p>2. How deep is our value + relationship?</p>
      <p>3. What dynamics could flip this deal in the next 6–12 months?</p>
      <p>4. What are the next <strong>two moves</strong> we will make?</p>
      <p>That’s it.</p>
      <p>Not 17 tabs, 4 disconnected tools, and a rainbow of scores.</p>
      <p>One view.</p>
      <p>One narrative.</p>
      <p>That’s what your ELT cares about.</p>
      <p>That’s what your CSMs can actually use.</p>
      <hr>
      <h3>Step 5: Run a weekly Predictability Review (not just pipeline)</h3>
      <p>For your top 10–20 accounts:</p>
      <ul>
      <li>Stop doing meetings where everyone just reads out “green / yellow / red”.</li>
      <li>Start doing meetings where you ask:</li>
      </ul>
      <blockquote>“What changed this week that affects predictability?”</blockquote>
      <p>Talk about:</p>
      <ul>
      <li>New risks, new leverage, new dynamics.</li>
      <li>Moments of proof you can amplify.</li>
      <li>Places where you’ve drifted into “vendor” instead of “partner”.</li>
      </ul>
      <p>You’re training the team to think like <strong>portfolio managers</strong>,</p>
      <p>not ticket responders.</p>
      <hr>
      <h2>5 questions to ask your team this week</h2>
      <p>Drop these into your next CS sync or leadership meeting:</p>
      <p>1. Which “green” account makes you the most nervous, and why?</p>
      <p>2. Which account looks messy in the tools but you feel strangely calm about? What does your gut know that the score doesn’t?</p>
      <p>3. Where have we proven a real business outcome in the last 90 days, and did we document it anywhere an exec would care about?</p>
      <p>4. Which customer has the most <strong>change</strong> happening internally right now, and how does that change our risk or upside?</p>
      <p>5. If you could only keep 5 customers from your portfolio, which ones would you fight hardest for — and what do they have in common?</p>
      <p>The answers will tell you more about your real risk posture</p>
      <p>than any single health score ever will.</p>
      <hr>
      <h2>Bring this back to your world</h2>
      <p>If your dashboard is telling you everything is “healthy”</p>
      <p>but your renewal anxiety doesn’t match,</p>
      <p>trust your instincts.</p>
      <p>Your instincts are picking up on:</p>
      <ul>
      <li>Direction</li>
      <li>Depth</li>
      <li>Dynamics</li>
      </ul>
      <p>Your tools just aren’t wired to see it yet.</p>
      <p>Start small:</p>
      <ul>
      <li>Pick 10 accounts.</li>
      <li>Score them on those three lenses.</li>
      <li>Build one Predictability View per account.</li>
      <li>Run a weekly 30-minute review for a month.</li>
      </ul>
      <p>You’ll be shocked how quickly patterns emerge.</p>
      <hr>
      <p>If this hit a nerve, forward it to the person in your company who owns “health scores”.</p>
      <p>Ask them a simple question:</p>
      <blockquote>“Are we measuring comfort, or predictability?”</blockquote>
      <p>Because churn isn’t where the story ends.</p>
      <p>It’s just where the metrics finally caught up.</p>
      <p>**Churn is dead.</p>
      <p>Predictability is the new moat.**</p>
