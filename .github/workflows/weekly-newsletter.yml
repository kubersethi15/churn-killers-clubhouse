name: Weekly Newsletter Generator

on:
  schedule:
    # Every Sunday at 00:00 UTC = 11:00 AM AEDT / 10:00 AM AEST
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      topic_override:
        description: 'Override the auto-selected topic (leave empty for auto)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic reportlab

      - name: Generate newsletter and playbook
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOPIC_OVERRIDE: ${{ github.event.inputs.topic_override || '' }}
        run: python scripts/generate_newsletter.py

      - name: Commit and push
        run: |
          git config user.name "Churn Is Dead Bot"
          git config user.email "newsletter@churnisdead.com"
          git add supabase/migrations/*.sql public/pdfs/*.pdf
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Extract newsletter title from the generated metadata
          TITLE=$(cat /tmp/newsletter_title.txt 2>/dev/null || echo "Weekly Newsletter")
          git commit -m "📰 New newsletter: ${TITLE}"
          git push origin main
